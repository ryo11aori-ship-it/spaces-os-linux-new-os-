name: Pure VoidOS Boot Sequence
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build_and_boot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 1. Setup Tools & Virtual Hardware
      run: |
        echo "=== Setting up Bare Metal Environment ==="
        sudo apt-get update
        sudo apt-get install -y gcc qemu-system-x86 python3

    - name: 2. Compile Oracle VM
      run: |
        echo "--- Compiling 4-Bit Oracle VM ---"
        mkdir -p bin src seed tests
        gcc -O3 src/ref/vm.c -o bin/ref_vm

    - name: 3. Forge VoidOS Meta-Compiler
      run: |
        echo "--- Forging Spaces v2.0 Meta-Compiler ---"
        python3 tools/gen_spaces_compiler_bf_bundler.py > src/compiler.bf
        python3 tools/bf_to_spaces.py src/compiler.bf > src/compiler.spaces
        # 今後、コンパイラ自体の生成系も直出力に移行する足掛かりとして
        # まずはカーネル生成系から .bf を完全排除します。

    - name: 4. Forge VoidOS Native Compiler (No Brainfuck Middleman)
      run: |
        echo "--- Writing OS Compiler directly to Spaces ---"
        
        # 1. ジェネレータをCI環境上で動的に錬成 (インデントエラーを物理排除)
        cat << 'EOF' > tools/forge_compiler_direct.py
        import sys
        def o(v):
         sys.stdout.write("\u3000" if (v>>3)&1 else " ")
         sys.stdout.write("\u3000" if (v>>2)&1 else " ")
         sys.stdout.write("\u3000" if (v>>1)&1 else " ")
         sys.stdout.write("\u3000" if v&1 else " ")
        def c(op):
         m={'>':0,'<':1,'+':2,'-':3,'.':4,',':5,'[':6,']':7}
         if op in m: o(m[op])
        class VM:
         def __init__(s): s.c=""; s.p=0
         def g(s,n):
          if n>s.p: s.c+=">"*(n-s.p)
          elif n<s.p: s.c+="<"*(s.p-n)
          s.p=n
         def a(s,n,v): s.g(n); s.c+="+"*v
         def d(s,n,v): s.g(n); s.c+="-"*v
         def z(s,n): s.g(n); s.c+="[-]"
         def cp(s,src,dst,t):
          s.z(dst); s.z(t); s.g(src); s.c+="["
          s.g(dst); s.c+="+"; s.g(t); s.c+="+"
          s.g(src); s.c+="-]"; s.g(t); s.c+="["
          s.g(src); s.c+="+"; s.g(t); s.c+="-]"
         def jz(s,v,f,cb):
          s.z(f); s.a(f,1); s.g(v); s.c+="["
          s.z(f); s.z(v); s.c+="]"; s.g(f); s.c+="["
          cb(); s.z(f); s.c+="]"
         def sa(s,b,v,t1,t2):
          s.z(t1); s.g(b); s.c+="["; s.g(t1); s.c+="+"; s.g(b); s.c+="-]"
          s.g(t1); s.c+="["; s.g(b); s.c+="++"; s.g(t1); s.c+="-]"
          s.cp(v,t1,t2)
          s.g(t1); s.c+="["; s.g(b); s.c+="+"; s.g(t1); s.c+="-]"
        v=VM()
        mbr=[0]*512
        m=[0xFA,0x31,0xC0,0x8E,0xD8,0x8E,0xC0,0x8E,0xD0,0xBC,0x00,0x7C,0xB4,0x02,0xB0,0x10,0xB5,0x00,0xB1,0x02,0xB6,0x00,0xBB,0x00,0x7E,0xCD,0x13,0xBE,0x00,0x7E,0xBF,0x00,0x10,0x8A,0x04,0x46,0x08,0xC0,0x74,0x25,0x3C,0x03,0x75,0x02,0xFE,0x05,0x3C,0x04,0x75,0x02,0xFE,0x0D,0x3C,0x01,0x75,0x01,0x47,0x3C,0x02,0x75,0x01,0x4F,0x3C,0x05,0x75,0x09,0x8A,0x05,0xB4,0x01,0xBA,0x00,0x00,0xCD,0x14,0xEB,0xD4,0xF4,0xEB,0xFD]
        for i in range(len(m)): mbr[i]=m[i]
        mbr[510]=0x55; mbr[511]=0xAA
        for b in mbr:
         v.z(20); v.a(20,b); v.g(20); v.c+="."
        v.z(2); v.z(3)
        v.g(1); v.c+=",["
        v.z(4); v.z(5)
        v.cp(1,6,7); v.d(6,32)
        def os(): v.z(4); v.a(4,1); v.z(5)
        v.jz(6,8,os)
        v.cp(1,6,7); v.d(6,227)
        def of(): v.c+="[-],[-],"; v.z(4); v.a(4,1); v.z(5); v.a(5,1)
        v.jz(6,8,of)
        v.g(4); v.c+="["
        v.sa(3,5,6,7)
        v.a(2,1)
        v.cp(2,6,7); v.d(6,4)
        def o4():
         v.a(3,1)
         v.g(3); v.c+="."; v.z(2); v.z(3)
        v.jz(6,8,o4)
        v.z(4); v.c+="]"
        v.g(1); v.c+="[-],]"
        for x in v.c: c(x)
        EOF
        
        # 2. Pythonから直接、コンパイラ(Spaces)を生成
        python3 tools/forge_compiler_direct.py > src/voidos_compiler.spaces
        echo "✅ Pure Spaces Compiler Written directly."

    - name: 5. Bootstrap OS Compiler Image
      run: |
        echo "--- Oracle VM compiles the VoidOS Native Compiler ---"
        # 以前のシェルカーネルではなく、今回はOS自体がコンパイラとなる
        ./bin/ref_vm src/compiler.spaces < src/voidos_compiler.spaces > seed/voidos_compiler.img
        IMG_SIZE=$(stat -c%s seed/voidos_compiler.img)
        echo "✅ Bootable Compiler Image Forged! Size: $IMG_SIZE bytes"

    - name: 6. The First Cry of the Compiler OS (QEMU Boot Test)
      run: |
        echo "=== Booting VoidOS Native Compiler in QEMU ==="
        # ターミナルの文字コード干渉を防ぐため、シリアル出力を直接 raw バイナリファイルに書き出す
        timeout 5 qemu-system-x86_64 -display none -serial file:serial.bin -drive format=raw,file=seed/voidos_compiler.img || true
        
        echo "--- Hex Dump of COM1 Serial Output ---"
        # 何が出力されたか確認できるように最初の数行をダンプ
        od -v -t x1 serial.bin | head -n 10
        
        # 純粋なバイナリファイルからMBRの先頭機械語 (fa 31 c0 8e d8 8e) を検索
        if od -v -t x1 serial.bin | tr -d ' \n' | grep -q "fa31c08ed88e"; then
          echo "🎉 SUCCESS! The VoidOS Native Compiler booted and emitted the next generation's MBR!"
        else
          echo "❌ FAILED: The Compiler OS did not boot or emit correctly."
          exit 1
        fi

    - name: 7. Upload VoidOS Image
      uses: actions/upload-artifact@v4
      with:
        name: voidos-boot-image
        path: |
          seed/*.img
          *.log
          src/
