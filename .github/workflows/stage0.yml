name: VoidOS Spaces v2.0 CI
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build_and_boot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 1. Setup Tools & QEMU
      run: |
        echo "=== Setting up Bare Metal Environment ==="
        sudo apt-get update
        sudo apt-get install -y gcc qemu-system-x86 python3

    - name: 2. Compile Oracle VM (Spaces v2.0)
      run: |
        echo "--- Compiling 4-Bit Oracle VM ---"
        mkdir -p bin src seed tests
        gcc -O3 src/ref/vm.c -o bin/ref_vm

    - name: 3. Bootstrap VoidOS Compiler
      run: |
        echo "--- Forging Spaces v2.0 Meta-Compiler ---"
        python3 tools/gen_spaces_compiler_bf_bundler.py > src/compiler.bf
        python3 tools/bf_to_spaces.py src/compiler.bf > src/compiler.spaces
        
        echo "--- Self-Hosting: Oracle VM compiles the VoidOS Boot Image ---"
        # 拡張子を .elf ではなく、ディスクイメージ .img に変更！
        ./bin/ref_vm src/compiler.spaces < src/compiler.spaces > seed/void_boot.img
        
        IMG_SIZE=$(stat -c%s seed/void_boot.img)
        echo "✅ Boot Image Forged! Size: $IMG_SIZE bytes"

    - name: 4. The First Cry of VoidOS (QEMU Boot Test)
      run: |
        echo "=== Booting VoidOS in QEMU Virtual Hardware ==="
        # QEMUをグラフィックなし(シリアルポート接続)で起動し、最大5秒間待つ
        timeout 5 qemu-system-x86_64 -nographic -drive format=raw,file=seed/void_boot.img | tee boot.log || true
        
        # MBRの機械語がシリアルポート(COM1)に正しく "VOID" を叫んだか確認
        if grep -q "VOID" boot.log; then
          echo "🎉 SUCCESS! The Spaces-generated MBR successfully booted and spoke to hardware!"
        else
          echo "❌ FAILED: The OS did not boot correctly."
          exit 1
        fi

    - name: 5. Upload VoidOS Image
      uses: actions/upload-artifact@v4
      with:
        name: voidos-boot-image
        path: |
          seed/*.img
          *.log
