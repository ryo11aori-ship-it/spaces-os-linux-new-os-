name: Pure VoidOS Boot Sequence
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build_and_boot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 1. Setup Tools & Virtual Hardware
      run: |
        echo "=== Setting up Bare Metal Environment ==="
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y qemu-system-x86 python3 pv

    - name: 2. Build VoidOS Architecture (REPL OS)
      run: |
        set -euo pipefail
        echo "--- Building Spaces REPL OS directly ---"
        mkdir -p tools seed

        cat << 'EOF' > tools/build_os.py
        from pathlib import Path

        class Asm:
            def __init__(self):
                self.buf = bytearray()
                self.labels = {}
                self.fixups = []

            def emit(self, *bs: int) -> None:
                self.buf.extend(bs)

            def label(self, name: str) -> None:
                self.labels[name] = len(self.buf)

            def jcc8(self, opcode: int, label: str) -> None:
                pos = len(self.buf)
                self.buf.extend([opcode, 0])
                self.fixups.append((pos + 1, label, 8))

            def jmp8(self, label: str) -> None:
                self.jcc8(0xEB, label)

            def jmp16(self, label: str) -> None:
                pos = len(self.buf)
                self.buf.extend([0xE9, 0, 0])
                self.fixups.append((pos + 1, label, 16))

            def resolve(self) -> bytes:
                for pos, label, size in self.fixups:
                    if label not in self.labels:
                        raise KeyError(f"undefined label: {label}")
                    target = self.labels[label]
                    if size == 8:
                        rel = target - (pos + 1)
                        if not -128 <= rel <= 127:
                            raise ValueError(f"branch out of range for {label}: {rel}")
                        self.buf[pos] = rel & 0xFF
                    elif size == 16:
                        rel = target - (pos + 2)
                        self.buf[pos] = rel & 0xFF
                        self.buf[pos+1] = (rel >> 8) & 0xFF
                return bytes(self.buf)

        def build_mbr() -> bytes:
            mbr = bytearray()
            mbr += bytes([0xFA, 0x31, 0xC0, 0x8E, 0xD8, 0x8E, 0xC0, 0x8E, 0xD0, 0xBC, 0x00, 0x7C, 0xFB])
            mbr += bytes([0x88, 0x16, 0x00, 0x05])
            mbr += bytes([0xB4, 0x02, 0xB0, 0x02, 0xB5, 0x00, 0xB1, 0x02, 0xB6, 0x00])
            mbr += bytes([0x8A, 0x16, 0x00, 0x05, 0xBB, 0x00, 0x7E, 0xCD, 0x13, 0x73, 0x0B])
            mbr += bytes([0xB4, 0x0E, 0xB0, 0x45, 0xCD, 0x10, 0xFA, 0xF4, 0xEB, 0xFE, 0x90])
            mbr += bytes([0xEA, 0x00, 0x7E, 0x00, 0x00])
            if len(mbr) > 510: raise ValueError("MBR too large")
            return bytes(mbr.ljust(510, b'\x00') + b'\x55\xAA')

        def build_stage2() -> bytes:
            s = Asm()
            s.emit(0xFA, 0x31, 0xC0, 0x8E, 0xD8, 0x8E, 0xC0)

            # UART Init
            s.emit(
                0xBA, 0xF9, 0x03, 0xB0, 0x00, 0xEE,
                0xBA, 0xFB, 0x03, 0xB0, 0x80, 0xEE,
                0xBA, 0xF8, 0x03, 0xB0, 0x03, 0xEE,
                0xBA, 0xF9, 0x03, 0xB0, 0x00, 0xEE,
                0xBA, 0xFB, 0x03, 0xB0, 0x03, 0xEE,
                0xBA, 0xFA, 0x03, 0xB0, 0xC7, 0xEE,
                0xBA, 0xFC, 0x03, 0xB0, 0x0B, 0xEE,
            )

            # === REPL Start: プロンプト "> " の出力 ===
            s.label("repl_start")
            s.emit(0xB0, 0x3E)          # '>'
            s.label("wait_gt")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_gt")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)
            
            s.emit(0xB0, 0x20)          # ' '
            s.label("wait_spc")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_spc")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)

            # === Phase 1: Spaces UTF-8 Decoder & Loader ===
            s.emit(0xBF, 0x00, 0x80)    # di = 0x8000
            
            s.label("load_op")
            s.emit(0x31, 0xDB)          # bx = 0
            s.emit(0xB9, 0x04, 0x00)    # cx = 4
            
            s.label("read_char")
            s.label("wait_rx1")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x01)
            s.jcc8(0x74, "wait_rx1")
            s.emit(0xBA, 0xF8, 0x03, 0xEC)
            
            # 【REPLハック】改行(\n) または EOF(\0) が来たら実行開始！
            s.emit(0x3C, 0x0A)          # \n ?
            s.jcc8(0x74, "do_vm_init")
            s.emit(0x3C, 0x0D)          # \r ?
            s.jcc8(0x74, "do_vm_init")
            s.emit(0x08, 0xC0)          # EOF (0x00) ?
            s.jcc8(0x75, "chk_half")
            
            s.label("do_vm_init")
            s.jmp16("vm_init")
            
            s.label("chk_half")
            s.emit(0x3C, 0x20)          # Half space?
            s.jcc8(0x74, "bit_zero")
            s.emit(0x3C, 0xE3)          # Full space?
            s.jcc8(0x75, "read_char")   # Ignore invalid chars
            
            s.label("wait_rx2")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x01)
            s.jcc8(0x74, "wait_rx2")
            s.emit(0xBA, 0xF8, 0x03, 0xEC)
            s.label("wait_rx3")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x01)
            s.jcc8(0x74, "wait_rx3")
            s.emit(0xBA, 0xF8, 0x03, 0xEC)
            
            s.emit(0xD1, 0xE3)          # shl bx, 1
            s.emit(0x83, 0xCB, 0x01)    # or bx, 1
            s.jmp8("bit_done")
            
            s.label("bit_zero")
            s.emit(0xD1, 0xE3)          # shl bx, 1
            
            s.label("bit_done")
            s.emit(0x49, 0x09, 0xC9)
            s.jcc8(0x75, "read_char")
            
            s.emit(0x88, 0x1D, 0x47)    # mov [di], bl; inc di
            s.jmp16("load_op")

            # === Phase 2: VM Initialization ===
            s.label("vm_init")
            
            # 見た目を綺麗にするため、実行前に改行を出力
            s.emit(0xB0, 0x0D)
            s.label("wait_cr1")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_cr1")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)

            s.emit(0xB0, 0x0A)
            s.label("wait_lf1")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_lf1")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)

            s.emit(0xB0, 0xFF, 0xAA)    # Null-terminate code with 0xFF
            
            # Clear Tape (0x1000 ~ 0x3FFF)
            s.emit(0xBF, 0x00, 0x10)
            s.emit(0xB9, 0x00, 0x30)
            s.emit(0x31, 0xC0)
            s.emit(0xF3, 0xAA)
            
            s.emit(0xBE, 0x00, 0x80)    # si = 0x8000
            s.emit(0xBD, 0x00, 0x10)    # bp = 0x1000

            # === Phase 3: Fetch & Execute Loop ===
            s.label("fetch")
            s.emit(0x8A, 0x04, 0x46)    # al = [si], inc si
            s.emit(0x3C, 0xFF)          # End of code?
            s.jcc8(0x75, "continue_exec")
            
            # 【REPLハック】実行終了時、haltせずに改行を出力してrepl_startへ飛ぶ！
            s.emit(0xB0, 0x0D)
            s.label("wait_cr2")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_cr2")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)

            s.emit(0xB0, 0x0A)
            s.label("wait_lf2")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_lf2")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)
            
            s.jmp16("repl_start")       # 輪廻転生！！
            
            s.label("continue_exec")
            # 0: '>'
            s.emit(0x3C, 0x00)
            s.jcc8(0x75, "chk_1")
            s.emit(0x45)
            s.jmp16("fetch")
            
            # 1: '<'
            s.label("chk_1")
            s.emit(0x3C, 0x01)
            s.jcc8(0x75, "chk_2")
            s.emit(0x4D)
            s.jmp16("fetch")
            
            # 2: '+'
            s.label("chk_2")
            s.emit(0x3C, 0x02)
            s.jcc8(0x75, "chk_3")
            s.emit(0x3E, 0xFE, 0x46, 0x00)
            s.jmp16("fetch")
            
            # 3: '-'
            s.label("chk_3")
            s.emit(0x3C, 0x03)
            s.jcc8(0x75, "chk_4")
            s.emit(0x3E, 0xFE, 0x4E, 0x00)
            s.jmp16("fetch")
            
            # 4: '.'
            s.label("chk_4")
            s.emit(0x3C, 0x04)
            s.jcc8(0x75, "chk_5")
            s.label("tx_wait")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "tx_wait")
            s.emit(0xBA, 0xF8, 0x03, 0x3E, 0x8A, 0x46, 0x00, 0xEE)
            s.jmp16("fetch")
            
            # 5: ','
            s.label("chk_5")
            s.emit(0x3C, 0x05)
            s.jcc8(0x75, "chk_6")
            s.label("rx_wait")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x01)
            s.jcc8(0x74, "rx_wait")
            s.emit(0xBA, 0xF8, 0x03, 0xEC, 0x3E, 0x88, 0x46, 0x00)
            s.jmp16("fetch")
            
            # 6: '['
            s.label("chk_6")
            s.emit(0x3C, 0x06)
            s.jcc8(0x75, "chk_7")
            s.emit(0x3E, 0x80, 0x7E, 0x00, 0x00)
            s.jcc8(0x75, "fwd_done")
            s.emit(0xB9, 0x01, 0x00)
            s.label("fwd_loop")
            s.emit(0x8A, 0x04, 0x46)
            s.emit(0x3C, 0x06)
            s.jcc8(0x75, "fwd_not_l")
            s.emit(0x41)
            s.label("fwd_not_l")
            s.emit(0x3C, 0x07)
            s.jcc8(0x75, "fwd_chk")
            s.emit(0x49)
            s.label("fwd_chk")
            s.emit(0x09, 0xC9)
            s.jcc8(0x75, "fwd_loop")
            s.label("fwd_done")
            s.jmp16("fetch")
            
            # 7: ']'
            s.label("chk_7")
            s.emit(0x3C, 0x07)
            s.jcc8(0x75, "fetch_jmp")
            s.emit(0x3E, 0x80, 0x7E, 0x00, 0x00)
            s.jcc8(0x74, "fetch_jmp")
            s.emit(0xB9, 0x01, 0x00)
            s.emit(0x83, 0xEE, 0x02)
            s.label("bwd_loop")
            s.emit(0x8A, 0x04, 0x4E)
            s.emit(0x3C, 0x07)
            s.jcc8(0x75, "bwd_not_r")
            s.emit(0x41)
            s.label("bwd_not_r")
            s.emit(0x3C, 0x06)
            s.jcc8(0x75, "bwd_chk")
            s.emit(0x49)
            s.label("bwd_chk")
            s.emit(0x09, 0xC9)
            s.jcc8(0x75, "bwd_loop")
            s.emit(0x83, 0xC6, 0x02)
            s.label("fetch_jmp")
            s.jmp16("fetch")

            stage2 = s.resolve()
            return stage2.ljust(1024, b'\x00')

        def main() -> None:
            mbr = build_mbr()
            stage2 = build_stage2()

            img = mbr + stage2
            Path("seed/voidos_compiler.img").write_bytes(img)
            Path("seed/voidos_compiler.img").write_bytes(img.ljust(10 * 1024 * 1024, b'\x00'))

            # Aを出力するプログラムと、Bを出力するプログラムを2つ用意！
            bf1 = "++++++[>++++++++++<-]>+++++."
            bf2 = "++++++[>++++++++++<-]>++++++."
            
            def to_spaces(bf):
                b_to_s = {'>':0, '<':1, '+':2, '-':3, '.':4, ',':5, '[':6, ']':7}
                bits = []
                for c in bf:
                    if c in b_to_s:
                        val = b_to_s[c]
                        bits.extend([(val >> 3) & 1, (val >> 2) & 1, (val >> 1) & 1, val & 1])
                out = bytearray()
                for bit in bits:
                    out.extend("\u3000".encode("utf-8") if bit else " ".encode("utf-8"))
                return bytes(out)
            
            # 各プログラムの末尾に「改行(\n)」を付与して保存
            Path("payload1.spaces").write_bytes(to_spaces(bf1) + b"\n")
            Path("payload2.spaces").write_bytes(to_spaces(bf2) + b"\n")

            print(f"MBR size: {len(mbr)}")
            print(f"Stage2 size: {len(stage2)}")

        if __name__ == "__main__":
            main()
        EOF

        python3 tools/build_os.py

    - name: 3. The Interactive Void (QEMU Boot Test)
      run: |
        set -euo pipefail
        echo "=== Booting VoidOS REPL in QEMU ==="

        # OSが準備完了するまで2秒待ち、payload1(Aを出力)を流す。
        # OSがそれを実行し終えるまで1秒待ってから、payload2(Bを出力)を流す！
        (sleep 2; cat payload1.spaces; sleep 1; cat payload2.spaces) | timeout 180 qemu-system-x86_64 \
          -display none \
          -serial stdio \
          -drive file=seed/voidos_compiler.img,format=raw,index=0,media=disk \
          > serial.bin || true

        echo "--- Hex Dump & Text of COM1 Serial Output ---"
        ls -l serial.bin
        od -v -t c serial.bin | head -n 30
        cat serial.bin

        # "A"と"B"の両方がログに含まれていれば、REPLループ大成功！
        if grep -q "A" serial.bin && grep -q "B" serial.bin; then
          echo "🎉 SUCCESS! VoidOS is now an Interactive REPL OS!"
        else
          echo "❌ FAILED: The REPL did not execute both payloads correctly."
          exit 1
        fi

    - name: 4. Upload VoidOS Image
      uses: actions/upload-artifact@v4
      with:
        name: voidos-boot-image
        path: |
          seed/*.img
          *.log
          serial.bin
