name: Pure VoidOS Boot Sequence
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build_and_boot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 1. Setup Tools & Virtual Hardware
      run: |
        echo "=== Setting up Bare Metal Environment ==="
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y gcc qemu-system-x86 python3 nasm

    - name: 2. Compile Oracle VM
      run: |
        echo "--- Compiling 4-Bit Oracle VM ---"
        mkdir -p bin src seed tests
        gcc -O3 src/ref/vm.c -o bin/ref_vm

    - name: 3. Compile Void Engine (MBR) via NASM
      run: |
        echo "--- Compiling Void Engine (MBR) ---"
        cat << 'EOF' > src/mbr.asm
        org 0x7c00
        bits 16
        cli
        xor ax, ax
        mov ds, ax
        mov es, ax
        mov ss, ax
        mov sp, 0x7c00
        mov ah, 0x02
        mov al, 0x40
        mov ch, 0
        mov cl, 2
        mov dh, 0
        mov bx, 0x7e00
        int 0x13
        mov si, 0x7e00
        mov di, 0x1000
        next_instr:
        mov al, [si]
        inc si
        or al, al
        jz halt
        cmp al, 0
        jne .L1
        inc di
        jmp next_instr
        .L1:
        cmp al, 1
        jne .L2
        dec di
        jmp next_instr
        .L2:
        cmp al, 2
        jne .L3
        inc byte [di]
        jmp next_instr
        .L3:
        cmp al, 3
        jne .L4
        dec byte [di]
        jmp next_instr
        .L4:
        cmp al, 4
        jne .L5
        mov al, [di]
        mov ah, 0x01
        xor dx, dx
        int 0x14
        jmp next_instr
        .L5:
        cmp al, 5
        jne .L6
        mov ah, 0x02
        xor dx, dx
        int 0x14
        mov [di], al
        jmp next_instr
        .L6:
        cmp al, 6
        jne .L7
        cmp byte [di], 0
        jne next_instr
        mov cx, 1
        .fwd:
        mov al, [si]
        inc si
        cmp al, 6
        jne .fwd_not_l
        inc cx
        .fwd_not_l:
        cmp al, 7
        jne .fwd_not_r
        dec cx
        .fwd_not_r:
        or cx, cx
        jnz .fwd
        jmp next_instr
        .L7:
        cmp al, 7
        jne next_instr
        cmp byte [di], 0
        jz next_instr
        mov cx, 1
        sub si, 2
        .bwd:
        mov al, [si]
        dec si
        cmp al, 7
        jne .bwd_not_r
        inc cx
        .bwd_not_r:
        cmp al, 6
        jne .bwd_not_l
        dec cx
        .bwd_not_l:
        or cx, cx
        jnz .bwd
        add si, 2
        jmp next_instr
        halt:
        hlt
        jmp halt
        times 510-($-$$) db 0
        dw 0xaa55
        EOF
        nasm -f bin src/mbr.asm -o src/mbr.bin

    - name: 4. Forge VoidOS Meta-Compiler
      run: |
        echo "--- Forging Spaces v2.0 Meta-Compiler ---"
        cat << 'EOF' > tools/gen_spaces_compiler_bf_bundler.py
        import sys
        class VM:
         def __init__(s): s.c=""; s.p=0
         def g(s,n):
          if n>s.p: s.c+=">"*(n-s.p)
          elif n<s.p: s.c+="<"*(s.p-n)
          s.p=n
         def a(s,n,v): s.g(n); s.c+="+"*v
         def d(s,n,v): s.g(n); s.c+="-"*v
         def z(s,n): s.g(n); s.c+="[-]"
         def cp(s,src,dst,t):
          s.z(dst); s.z(t); s.g(src); s.c+="["
          s.g(dst); s.c+="+"; s.g(t); s.c+="+"
          s.g(src); s.c+="-]"; s.g(t); s.c+="["
          s.g(src); s.c+="+"; s.g(t); s.c+="-]"
         def jz(s,v,f,cb):
          s.z(f); s.a(f,1); s.g(v); s.c+="["
          s.z(f); s.z(v); s.c+="]"; s.g(f); s.c+="["
          cb(); s.z(f); s.c+="]"
         def sa(s,b,v,t1,t2):
          s.z(t1); s.g(b); s.c+="["; s.g(t1); s.c+="+"; s.g(b); s.c+="-]"
          s.g(t1); s.c+="["; s.g(b); s.c+="++"; s.g(t1); s.c+="-]"
          s.cp(v,t1,t2)
          s.g(t1); s.c+="["; s.g(b); s.c+="+"; s.g(t1); s.c+="-]"
        v=VM()
        with open("src/mbr.bin", "rb") as f:
         mbr = f.read()
        for b in mbr:
         v.z(20); v.a(20,b); v.g(20); v.c+="."
        v.z(2); v.z(3)
        v.g(1); v.c+=",["
        v.z(4); v.z(5)
        v.cp(1,6,7); v.d(6,32)
        def os(): v.z(4); v.a(4,1); v.z(5)
        v.jz(6,8,os)
        v.cp(1,6,7); v.d(6,227)
        def of(): v.c+="[-],[-],"; v.z(4); v.a(4,1); v.z(5); v.a(5,1)
        v.jz(6,8,of)
        v.g(4); v.c+="["
        v.sa(3,5,6,7)
        v.a(2,1)
        v.cp(2,6,7); v.d(6,4)
        def o4():
         v.a(3,1)
         v.g(3); v.c+="."; v.z(2); v.z(3)
        v.jz(6,8,o4)
        v.z(4); v.c+="]"
        v.g(1); v.c+="[-],]"
        sys.stdout.write(v.c)
        EOF
        python3 tools/gen_spaces_compiler_bf_bundler.py > src/compiler.bf
        python3 tools/bf_to_spaces.py src/compiler.bf > src/compiler.spaces

    - name: 5. Forge VoidOS Native Compiler (No Brainfuck Middleman)
      run: |
        echo "--- Writing OS Compiler directly to Spaces ---"
        cat << 'EOF' > tools/forge_compiler_direct.py
        import sys
        def o(v):
         sys.stdout.write("\u3000" if (v>>3)&1 else " ")
         sys.stdout.write("\u3000" if (v>>2)&1 else " ")
         sys.stdout.write("\u3000" if (v>>1)&1 else " ")
         sys.stdout.write("\u3000" if v&1 else " ")
        def c(op):
         m={'>':0,'<':1,'+':2,'-':3,'.':4,',':5,'[':6,']':7}
         if op in m: o(m[op])
        class VM:
         def __init__(s): s.c=""; s.p=0
         def g(s,n):
          if n>s.p: s.c+=">"*(n-s.p)
          elif n<s.p: s.c+="<"*(s.p-n)
          s.p=n
         def a(s,n,v): s.g(n); s.c+="+"*v
         def d(s,n,v): s.g(n); s.c+="-"*v
         def z(s,n): s.g(n); s.c+="[-]"
         def cp(s,src,dst,t):
          s.z(dst); s.z(t); s.g(src); s.c+="["
          s.g(dst); s.c+="+"; s.g(t); s.c+="+"
          s.g(src); s.c+="-]"; s.g(t); s.c+="["
          s.g(src); s.c+="+"; s.g(t); s.c+="-]"
         def jz(s,v,f,cb):
          s.z(f); s.a(f,1); s.g(v); s.c+="["
          s.z(f); s.z(v); s.c+="]"; s.g(f); s.c+="["
          cb(); s.z(f); s.c+="]"
         def sa(s,b,v,t1,t2):
          s.z(t1); s.g(b); s.c+="["; s.g(t1); s.c+="+"; s.g(b); s.c+="-]"
          s.g(t1); s.c+="["; s.g(b); s.c+="++"; s.g(t1); s.c+="-]"
          s.cp(v,t1,t2)
          s.g(t1); s.c+="["; s.g(b); s.c+="+"; s.g(t1); s.c+="-]"
        v=VM()
        with open("src/mbr.bin", "rb") as f:
         mbr = f.read()
        for b in mbr:
         v.z(20); v.a(20,b); v.g(20); v.c+="."
        v.z(2); v.z(3)
        v.g(1); v.c+=",["
        v.z(4); v.z(5)
        v.cp(1,6,7); v.d(6,32)
        def os(): v.z(4); v.a(4,1); v.z(5)
        v.jz(6,8,os)
        v.cp(1,6,7); v.d(6,227)
        def of(): v.c+="[-],[-],"; v.z(4); v.a(4,1); v.z(5); v.a(5,1)
        v.jz(6,8,of)
        v.g(4); v.c+="["
        v.sa(3,5,6,7)
        v.a(2,1)
        v.cp(2,6,7); v.d(6,4)
        def o4():
         v.a(3,1)
         v.g(3); v.c+="."; v.z(2); v.z(3)
        v.jz(6,8,o4)
        v.z(4); v.c+="]"
        v.g(1); v.c+="[-],]"
        for x in v.c: c(x)
        EOF
        python3 tools/forge_compiler_direct.py > src/voidos_compiler.spaces
        echo "✅ Pure Spaces Compiler Written directly."

    - name: 6. Bootstrap OS Compiler Image
      run: |
        echo "--- Oracle VM compiles the VoidOS Native Compiler ---"
        ./bin/ref_vm src/compiler.spaces < src/voidos_compiler.spaces > seed/voidos_compiler.img
        IMG_SIZE=$(stat -c%s seed/voidos_compiler.img)
        echo "✅ Bootable Compiler Image Forged! Size: $IMG_SIZE bytes"

    - name: 7. The First Cry of the Compiler OS (QEMU Boot Test)
      run: |
        echo "=== Booting VoidOS Native Compiler in QEMU ==="
        timeout 5 qemu-system-x86_64 -display none -serial file:serial.bin -drive format=raw,file=seed/voidos_compiler.img || true
        
        echo "--- Hex Dump of COM1 Serial Output ---"
        od -v -t x1 serial.bin | head -n 10
        
        if od -v -t x1 serial.bin | tr -d ' \n' | grep -q "fa31c08ed88e"; then
          echo "🎉 SUCCESS! The VoidOS Native Compiler booted and emitted the next generation's MBR!"
        else
          echo "❌ FAILED: The Compiler OS did not boot or emit correctly."
          exit 1
        fi

    - name: 8. Upload VoidOS Image
      uses: actions/upload-artifact@v4
      with:
        name: voidos-boot-image
        path: |
          seed/*.img
          *.log
          serial.bin
