name: Pure VoidOS Boot Sequence
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build_and_boot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 1. Setup Tools & Virtual Hardware
      run: |
        echo "=== Setting up Bare Metal Environment ==="
        sudo apt-get update
        sudo apt-get install -y gcc qemu-system-x86 python3

    - name: 2. Compile Oracle VM
      run: |
        echo "--- Compiling 4-Bit Oracle VM ---"
        mkdir -p bin src seed tests
        gcc -O3 src/ref/vm.c -o bin/ref_vm

    - name: 3. Forge VoidOS Meta-Compiler
      run: |
        echo "--- Forging Spaces v2.0 Meta-Compiler ---"
        python3 tools/gen_spaces_compiler_bf_bundler.py > src/compiler.bf
        python3 tools/bf_to_spaces.py src/compiler.bf > src/compiler.spaces
        # 今後、コンパイラ自体の生成系も直出力に移行する足掛かりとして
        # まずはカーネル生成系から .bf を完全排除します。

    - name: 4. Forge Pure Spaces Kernel (No Brainfuck Middleman)
      run: |
        echo "--- Writing OS Kernel directly to Spaces ---"
        # BFファイルを一切介さず、Pythonから直接カーネル(Spaces)を生成
        python3 tools/forge_kernel.py > src/kernel.spaces
        echo "✅ Pure Spaces Kernel Written directly."

    - name: 5. Bootstrap OS Image
      run: |
        echo "--- Self-Hosting: Oracle VM compiles the VoidOS Boot Image ---"
        ./bin/ref_vm src/compiler.spaces < src/kernel.spaces > seed/voidos.img
        
        IMG_SIZE=$(stat -c%s seed/voidos.img)
        echo "✅ Boot Image Forged! Size: $IMG_SIZE bytes"

    - name: 6. The First Cry of VoidOS (QEMU Boot Test)
      run: |
        echo "=== Booting VoidOS in QEMU Virtual Hardware ==="
        # QEMUを起動し、Spacesカーネルがシリアルポートを叩くのを監視
        timeout 5 qemu-system-x86_64 -nographic -drive format=raw,file=seed/voidos.img | tee boot.log || true
        
        if grep -q "VOID" boot.log; then
          echo "🎉 SUCCESS! The VoidOS Kernel successfully booted and controlled the bare metal!"
        else
          echo "❌ FAILED: The OS did not boot correctly."
          exit 1
        fi

    - name: 7. Upload VoidOS Image
      uses: actions/upload-artifact@v4
      with:
        name: voidos-boot-image
        path: |
          seed/*.img
          *.log
          src/
