name: Pure VoidOS Boot Sequence
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build_and_boot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 1. Setup Tools & Virtual Hardware
      run: |
        echo "=== Setting up Bare Metal Environment ==="
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y qemu-system-x86 python3 pv

    - name: 2. Build VoidOS Architecture
      run: |
        set -euo pipefail
        echo "--- Building bootable image directly ---"
        mkdir -p tools seed

        cat << 'EOF' > tools/build_os.py
        from pathlib import Path

        class Asm:
            def __init__(self):
                self.buf = bytearray()
                self.labels = {}
                self.fixups = []

            def emit(self, *bs: int) -> None:
                self.buf.extend(bs)

            def label(self, name: str) -> None:
                self.labels[name] = len(self.buf)

            def jcc8(self, opcode: int, label: str) -> None:
                pos = len(self.buf)
                self.buf.extend([opcode, 0])
                self.fixups.append((pos + 1, label))  # displacement byte index

            def resolve(self) -> bytes:
                for pos, label in self.fixups:
                    if label not in self.labels:
                        raise KeyError(f"undefined label: {label}")
                    target = self.labels[label]
                    rel = target - (pos + 1)
                    if not -128 <= rel <= 127:
                        raise ValueError(f"branch out of range for {label}: {rel}")
                    self.buf[pos] = rel & 0xFF
                return bytes(self.buf)

        def build_mbr() -> bytes:
            mbr = bytearray()

            # 16-bit real-mode setup
            mbr += bytes([
                0xFA,                   # cli
                0x31, 0xC0,             # xor ax, ax
                0x8E, 0xD8,             # mov ds, ax
                0x8E, 0xC0,             # mov es, ax
                0x8E, 0xD0,             # mov ss, ax
                0xBC, 0x00, 0x7C,       # mov sp, 0x7C00
                0xFB,                   # sti
            ])

            # Save boot drive
            mbr += bytes([
                0x88, 0x16, 0x00, 0x05, # mov [0x0500], dl
            ])

            # Read sector 2 (the second stage) to 0000:7E00 via CHS
            mbr += bytes([
                0xB4, 0x02,             # mov ah, 0x02
                0xB0, 0x01,             # mov al, 0x01   ; sectors to read
                0xB5, 0x00,             # mov ch, 0x00
                0xB1, 0x02,             # mov cl, 0x02   ; sector 2
                0xB6, 0x00,             # mov dh, 0x00
                0x8A, 0x16, 0x00, 0x05, # mov dl, [0x0500]
                0xBB, 0x00, 0x7E,       # mov bx, 0x7E00
                0xCD, 0x13,             # int 13h
                0x73, 0x0B,             # jnc +11
            ])

            # failure block, exactly 11 bytes
            mbr += bytes([
                0xB4, 0x0E,             # mov ah, 0x0E
                0xB0, 0x45,             # mov al, 'E'
                0xCD, 0x10,             # int 10h
                0xFA,                   # cli
                0xF4,                   # hlt
                0xEB, 0xFE,             # jmp $
                0x90,                   # nop
            ])

            # jump to loaded second stage
            mbr += bytes([
                0xEA, 0x00, 0x7E, 0x00, 0x00,  # jmp 0000:7E00
            ])

            if len(mbr) > 510:
                raise ValueError(f"MBR too large: {len(mbr)} bytes")

            mbr = mbr.ljust(510, b'\x00') + b'\x55\xAA'
            return bytes(mbr)

        def build_stage2() -> bytes:
            s = Asm()

            # Real-mode hygiene
            s.emit(
                0xFA,                   # cli
                0x31, 0xC0,             # xor ax, ax
                0x8E, 0xD8,             # mov ds, ax
                0x8E, 0xC0,             # mov es, ax
            )

            # COM1 init: 38400 8N1, FIFO enabled
            s.emit(
                0xBA, 0xF9, 0x03, 0xB0, 0x00, 0xEE,  # IER = 0
                0xBA, 0xFB, 0x03, 0xB0, 0x80, 0xEE,  # LCR DLAB = 1
                0xBA, 0xF8, 0x03, 0xB0, 0x03, 0xEE,  # DLL = 3
                0xBA, 0xF9, 0x03, 0xB0, 0x00, 0xEE,  # DLM = 0
                0xBA, 0xFB, 0x03, 0xB0, 0x03, 0xEE,  # LCR = 8N1
                0xBA, 0xFA, 0x03, 0xB0, 0xC7, 0xEE,  # FCR
                0xBA, 0xFC, 0x03, 0xB0, 0x0B, 0xEE,  # MCR
            )

            # Stream the boot sector (0x7C00..0x7DFF) as raw bytes to COM1
            s.emit(
                0xBE, 0x00, 0x7C,       # mov si, 0x7C00
                0xB9, 0x00, 0x02,       # mov cx, 0x0200
            )

            s.label("top")
            s.emit(
                0xBA, 0xFD, 0x03,       # mov dx, 0x3FD
            )
            s.label("wait")
            s.emit(
                0xEC,                   # in al, dx
                0xA8, 0x20,             # test al, 0x20 (THR empty)
            )
            s.jcc8(0x74, "wait")        # jz wait

            s.emit(
                0xBA, 0xF8, 0x03,       # mov dx, 0x3F8
                0x8A, 0x04,             # mov al, [si]
                0xEE,                   # out dx, al
                0x46,                   # inc si
            )
            s.jcc8(0xE2, "top")         # loop top

            s.emit(
                0xFA,                   # cli
                0xF4,                   # hlt
                0xEB, 0xFE,             # jmp $
            )

            stage2 = s.resolve()
            return stage2.ljust(512, b'\x00')

        def main() -> None:
            mbr = build_mbr()
            stage2 = build_stage2()

            img = mbr + stage2
            Path("seed/voidos_compiler.img").write_bytes(img)
            Path("seed/voidos_compiler.img").write_bytes(img.ljust(10 * 1024 * 1024, b'\x00'))

            print(f"MBR size: {len(mbr)}")
            print(f"Stage2 size: {len(stage2)}")
            print(f"Image size: {Path('seed/voidos_compiler.img').stat().st_size}")

        if __name__ == "__main__":
            main()
        EOF

        python3 tools/build_os.py

    - name: 3. The First Cry of the Compiler OS (QEMU Boot Test)
      run: |
        set -euo pipefail
        echo "=== Booting VoidOS Native Compiler in QEMU ==="

        timeout 180 qemu-system-x86_64 \
          -display none \
          -serial stdio \
          -drive file=seed/voidos_compiler.img,format=raw,index=0,media=disk \
          > serial.bin || true

        echo "--- Hex Dump of COM1 Serial Output ---"
        ls -l serial.bin
        od -v -t x1 serial.bin | head -n 20

        if od -v -t x1 serial.bin | tr -d ' \n' | grep -q "fa31c08ed88e"; then
          echo "🎉 SUCCESS!"
        else
          echo "❌ FAILED"
          exit 1
        fi

    - name: 4. Upload VoidOS Image
      uses: actions/upload-artifact@v4
      with:
        name: voidos-boot-image
        path: |
          seed/*.img
          *.log
          serial.bin
