name: Pure VoidOS Boot Sequence
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build_and_boot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 1. Setup Tools & Virtual Hardware
      run: |
        echo "=== Setting up Bare Metal Environment ==="
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y qemu-system-x86 python3 pv

    - name: 2. Build VoidOS REPL Architecture
      run: |
        set -euo pipefail
        echo "--- Building Spaces REPL OS directly ---"
        mkdir -p tools seed

        cat << 'EOF' > tools/build_os.py
        from pathlib import Path

        class Asm:
            def __init__(self):
                self.buf = bytearray()
                self.labels = {}
                self.fixups = []

            def emit(self, *bs: int) -> None:
                self.buf.extend(bs)

            def label(self, name: str) -> None:
                self.labels[name] = len(self.buf)

            def jcc8(self, opcode: int, label: str) -> None:
                pos = len(self.buf)
                self.buf.extend([opcode, 0])
                self.fixups.append((pos + 1, label, 8))

            def jmp8(self, label: str) -> None:
                self.jcc8(0xEB, label)

            def jmp16(self, label: str) -> None:
                pos = len(self.buf)
                self.buf.extend([0xE9, 0, 0])
                self.fixups.append((pos + 1, label, 16))

            def resolve(self) -> bytes:
                for pos, label, size in self.fixups:
                    if label not in self.labels:
                        raise KeyError(f"undefined label: {label}")
                    target = self.labels[label]
                    if size == 8:
                        rel = target - (pos + 1)
                        if not -128 <= rel <= 127:
                            raise ValueError(f"branch out of range for {label}: {rel}")
                        self.buf[pos] = rel & 0xFF
                    elif size == 16:
                        rel = target - (pos + 2)
                        self.buf[pos] = rel & 0xFF
                        self.buf[pos+1] = (rel >> 8) & 0xFF
                return bytes(self.buf)

        def build_mbr() -> bytes:
            mbr = bytearray()
            mbr += bytes([0xFA, 0x31, 0xC0, 0x8E, 0xD8, 0x8E, 0xC0, 0x8E, 0xD0, 0xBC, 0x00, 0x7C, 0xFB])
            mbr += bytes([0x88, 0x16, 0x00, 0x05])
            mbr += bytes([0xB4, 0x02, 0xB0, 0x02, 0xB5, 0x00, 0xB1, 0x02, 0xB6, 0x00])
            mbr += bytes([0x8A, 0x16, 0x00, 0x05, 0xBB, 0x00, 0x7E, 0xCD, 0x13, 0x73, 0x0B])
            mbr += bytes([0xB4, 0x0E, 0xB0, 0x45, 0xCD, 0x10, 0xFA, 0xF4, 0xEB, 0xFE, 0x90])
            mbr += bytes([0xEA, 0x00, 0x7E, 0x00, 0x00])
            if len(mbr) > 510: raise ValueError("MBR too large")
            return bytes(mbr.ljust(510, b'\x00') + b'\x55\xAA')

        def build_stage2() -> bytes:
            s = Asm()
            s.emit(0xFA, 0x31, 0xC0, 0x8E, 0xD8, 0x8E, 0xC0)

            # UART Init
            s.emit(
                0xBA, 0xF9, 0x03, 0xB0, 0x00, 0xEE,
                0xBA, 0xFB, 0x03, 0xB0, 0x80, 0xEE,
                0xBA, 0xF8, 0x03, 0xB0, 0x03, 0xEE,
                0xBA, 0xF9, 0x03, 0xB0, 0x00, 0xEE,
                0xBA, 0xFB, 0x03, 0xB0, 0x03, 0xEE,
                0xBA, 0xFA, 0x03, 0xB0, 0xC7, 0xEE,
                0xBA, 0xFC, 0x03, 0xB0, 0x0B, 0xEE,
            )

            # === REPL Start ===
            s.label("repl_start")
            s.emit(0xB0, 0x3E)          # '>'
            s.label("wait_gt")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_gt")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)
            
            s.emit(0xB0, 0x20)          # ' '
            s.label("wait_spc")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_spc")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)

            s.emit(0xBF, 0x00, 0x80)
            s.label("load_op")
            s.emit(0x31, 0xDB)
            s.emit(0xB9, 0x04, 0x00)
            
            s.label("read_char")
            s.label("wait_rx1")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x01)
            s.jcc8(0x74, "wait_rx1")
            s.emit(0xBA, 0xF8, 0x03, 0xEC)
            
            s.emit(0x3C, 0x0A)          # \n ?
            s.jcc8(0x74, "do_vm_init")
            s.emit(0x3C, 0x0D)          # \r ?
            s.jcc8(0x74, "do_vm_init")
            s.emit(0x08, 0xC0)          # EOF (0x00) ?
            s.jcc8(0x75, "chk_half")
            
            s.label("do_vm_init")
            s.jmp16("vm_init")
            
            s.label("chk_half")
            s.emit(0x3C, 0x20)
            s.jcc8(0x74, "bit_zero")
            s.emit(0x3C, 0xE3)
            s.jcc8(0x75, "read_char")
            
            s.label("wait_rx2")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x01)
            s.jcc8(0x74, "wait_rx2")
            s.emit(0xBA, 0xF8, 0x03, 0xEC)
            s.label("wait_rx3")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x01)
            s.jcc8(0x74, "wait_rx3")
            s.emit(0xBA, 0xF8, 0x03, 0xEC)
            
            s.emit(0xD1, 0xE3)
            s.emit(0x83, 0xCB, 0x01)
            s.jmp8("bit_done")
            
            s.label("bit_zero")
            s.emit(0xD1, 0xE3)
            
            s.label("bit_done")
            s.emit(0x49, 0x09, 0xC9)
            s.jcc8(0x75, "read_char")
            
            s.emit(0x88, 0x1D, 0x47)
            s.jmp16("load_op")

            s.label("vm_init")
            s.emit(0xB0, 0x0D)
            s.label("wait_cr1")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_cr1")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)

            s.emit(0xB0, 0x0A)
            s.label("wait_lf1")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_lf1")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)

            s.emit(0xB0, 0xFF, 0xAA)
            s.emit(0xBF, 0x00, 0x10)
            s.emit(0xB9, 0x00, 0x30)
            s.emit(0x31, 0xC0)
            s.emit(0xF3, 0xAA)
            s.emit(0xBE, 0x00, 0x80)
            s.emit(0xBD, 0x00, 0x10)

            s.label("fetch")
            s.emit(0x8A, 0x04, 0x46)
            s.emit(0x3C, 0xFF)
            s.jcc8(0x75, "continue_exec")
            
            s.emit(0xB0, 0x0D)
            s.label("wait_cr2")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_cr2")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)

            s.emit(0xB0, 0x0A)
            s.label("wait_lf2")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "wait_lf2")
            s.emit(0xBA, 0xF8, 0x03, 0xEE)
            
            s.jmp16("repl_start")
            
            s.label("continue_exec")
            s.emit(0x3C, 0x00)
            s.jcc8(0x75, "chk_1")
            s.emit(0x45)
            s.jmp16("fetch")
            
            s.label("chk_1")
            s.emit(0x3C, 0x01)
            s.jcc8(0x75, "chk_2")
            s.emit(0x4D)
            s.jmp16("fetch")
            
            s.label("chk_2")
            s.emit(0x3C, 0x02)
            s.jcc8(0x75, "chk_3")
            s.emit(0x3E, 0xFE, 0x46, 0x00)
            s.jmp16("fetch")
            
            s.label("chk_3")
            s.emit(0x3C, 0x03)
            s.jcc8(0x75, "chk_4")
            s.emit(0x3E, 0xFE, 0x4E, 0x00)
            s.jmp16("fetch")
            
            s.label("chk_4")
            s.emit(0x3C, 0x04)
            s.jcc8(0x75, "chk_5")
            s.label("tx_wait")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x20)
            s.jcc8(0x74, "tx_wait")
            s.emit(0xBA, 0xF8, 0x03, 0x3E, 0x8A, 0x46, 0x00, 0xEE)
            s.jmp16("fetch")
            
            s.label("chk_5")
            s.emit(0x3C, 0x05)
            s.jcc8(0x75, "chk_6")
            s.label("rx_wait")
            s.emit(0xBA, 0xFD, 0x03, 0xEC, 0xA8, 0x01)
            s.jcc8(0x74, "rx_wait")
            s.emit(0xBA, 0xF8, 0x03, 0xEC, 0x3E, 0x88, 0x46, 0x00)
            s.jmp16("fetch")
            
            s.label("chk_6")
            s.emit(0x3C, 0x06)
            s.jcc8(0x75, "chk_7")
            s.emit(0x3E, 0x80, 0x7E, 0x00, 0x00)
            s.jcc8(0x75, "fwd_done")
            s.emit(0xB9, 0x01, 0x00)
            s.label("fwd_loop")
            s.emit(0x8A, 0x04, 0x46)
            s.emit(0x3C, 0x06)
            s.jcc8(0x75, "fwd_not_l")
            s.emit(0x41)
            s.label("fwd_not_l")
            s.emit(0x3C, 0x07)
            s.jcc8(0x75, "fwd_chk")
            s.emit(0x49)
            s.label("fwd_chk")
            s.emit(0x09, 0xC9)
            s.jcc8(0x75, "fwd_loop")
            s.label("fwd_done")
            s.jmp16("fetch")
            
            s.label("chk_7")
            s.emit(0x3C, 0x07)
            s.jcc8(0x75, "fetch_jmp")
            s.emit(0x3E, 0x80, 0x7E, 0x00, 0x00)
            s.jcc8(0x74, "fetch_jmp")
            s.emit(0xB9, 0x01, 0x00)
            s.emit(0x83, 0xEE, 0x02)
            s.label("bwd_loop")
            s.emit(0x8A, 0x04, 0x4E)
            s.emit(0x3C, 0x07)
            s.jcc8(0x75, "bwd_not_r")
            s.emit(0x41)
            s.label("bwd_not_r")
            s.emit(0x3C, 0x06)
            s.jcc8(0x75, "bwd_chk")
            s.emit(0x49)
            s.label("bwd_chk")
            s.emit(0x09, 0xC9)
            s.jcc8(0x75, "bwd_loop")
            s.emit(0x83, 0xC6, 0x02)
            s.label("fetch_jmp")
            s.jmp16("fetch")

            stage2 = s.resolve()
            return stage2.ljust(1024, b'\x00')

        def main() -> None:
            mbr = build_mbr()
            stage2 = build_stage2()
            img = mbr + stage2
            Path("seed/voidos_compiler.img").write_bytes(img)
            Path("seed/voidos_compiler.img").write_bytes(img.ljust(10 * 1024 * 1024, b'\x00'))
            print(f"MBR size: {len(mbr)}")
            print(f"Stage2 size: {len(stage2)}")

        if __name__ == "__main__":
            main()
        EOF

        python3 tools/build_os.py

    - name: 3. Forge Native VoidOS Compiler (Spaces -> Bytecode)
      run: |
        echo "--- Building VoidOS Compiler in Spaces ---"
        cat << 'EOF' > tools/build_compiler.py
        import sys
        from pathlib import Path

        class VM:
            def __init__(self): self.c=""; self.p=0
            def g(self,n):
                if n>self.p: self.c+=">"*(n-self.p)
                elif n<self.p: self.c+="<"*(self.p-n)
                self.p=n
            def a(self,n,v): self.g(n); self.c+="+"*v
            def d(self,n,v): self.g(n); self.c+="-"*v
            def z(self,n): self.g(n); self.c+="[-]"
            def cp(self,src,dst,t):
                self.z(dst); self.z(t); self.g(src); self.c+="["
                self.g(dst); self.c+="+"; self.g(t); self.c+="+"
                self.g(src); self.c+="-]"; self.g(t); self.c+="["
                self.g(src); self.c+="+"; self.g(t); self.c+="-]"
            def jz(self,v,f,cb):
                self.z(f); self.a(f,1); self.g(v); self.c+="["
                self.z(f); self.z(v); self.c+="]"; self.g(f); self.c+="["
                cb(); self.z(f); self.c+="]"

        v=VM()
        
        # コンパイラのメインループ：1文字読んで、ASTに一致したら対応するバイトコード(0x00~0x07)を出力する
        v.g(1); v.c+=",["
        def chk(c_val, o_val):
            v.cp(1, 2, 3); v.d(2, c_val)
            def match():
                v.z(4); v.a(4, o_val); v.g(4); v.c+="."
            v.jz(2, 5, match)

        chk(62, 0) # >
        chk(60, 1) # <
        chk(43, 2) # +
        chk(45, 3) # -
        chk(46, 4) # .
        chk(44, 5) # ,
        chk(91, 6) # [
        chk(93, 7) # ]
        v.z(1); v.g(1); v.c+=",]"

        b_to_s = {'>':0, '<':1, '+':2, '-':3, '.':4, ',':5, '[':6, ']':7}
        bits = []
        for c in v.c:
            if c in b_to_s:
                val = b_to_s[c]
                bits.extend([(val >> 3) & 1, (val >> 2) & 1, (val >> 1) & 1, val & 1])

        out = bytearray()
        for bit in bits:
            out.extend(b"\xe3\x80\x80" if bit else b" ")
        
        # 1. まず「Spacesコンパイラ自身」をREPLでコンパイルさせるための改行トリガー
        out.extend(b"\n")
        # 2. 次に、OS上で稼働を始めたコンパイラに食わせる「ターゲットプログラム (+[-].) 」
        out.extend(b"+[-].\x00")
        
        Path("payload.bin").write_bytes(out)
        EOF
        
        python3 tools/build_compiler.py
        
    - name: 4. The Absolute Void (Self-Hosting Stream)
      run: |
        set -euo pipefail
        echo "=== Executing The Absolute Void ==="

        # OSが準備完了するまで2秒待ち、結合された完全なストリームを流し込む！
        (sleep 2; pv -q -L 5000 payload.bin) | timeout 180 qemu-system-x86_64 \
          -display none \
          -serial stdio \
          -drive file=seed/voidos_compiler.img,format=raw,index=0,media=disk \
          > serial.bin || true

        echo "--- Hex Dump of COM1 Serial Output ---"
        ls -l serial.bin
        od -v -t x1 serial.bin | head -n 30

        # OSが吐き出した16進数の中に、ターゲットプログラム (+[-].) をコンパイルしたバイトコード (0x02 0x06 0x03 0x07 0x04) が存在するかチェック！
        if od -v -t x1 serial.bin | tr -d ' \n' | grep -q "0206030704"; then
          echo "🎉 SUCCESS! The Spaces Compiler running on VoidOS successfully compiled the target program into VoidOS Bytecode!"
        else
          echo "❌ FAILED: The VM did not output the correct bytecode."
          exit 1
        fi

    - name: 5. Upload VoidOS Image
      uses: actions/upload-artifact@v4
      with:
        name: voidos-boot-image
        path: |
          seed/*.img
          *.log
          serial.bin
